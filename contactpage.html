    <section class="form">
        <h1>Contact Us</h1>
        <form id="contactForm" action="submit_form.php" method="post">
            <div class="label-input-container">
            <label for="contactPurpose">Contact Purpose:</label>
            <select id="contactPurpose" name="contactPurpose" required>
                <option value="" disabled selected>Select an option</option>
                <option value="sellBooks">I want to sell books</option>
                <option value="buyBooks">I want to buy books</option>
            </select>
        </div>
            
            <div class="label-input-container">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="label-input-container">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="label-input-container">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <fieldset>
                <legend>Contact Preference:</legend>
                <label><input type="checkbox" name="contactPreference[]" value="email">By Email</label>
                <label><input type="checkbox" name="contactPreference[]" value="phone">By Phone</label>
            </fieldset>

            <fieldset>
                <legend>Receive Weekly Newsletter:</legend>
                <label><input type="radio" name="newsletter" value="yes" checked>Yes</label>
                <label><input type="radio" name="newsletter" value="no">No</label>
            </fieldset>

            <label for="extraNotes">Extra Notes:</label>
            <textarea id="extraNotes" name="extraNotes"></textarea>

            <div>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
